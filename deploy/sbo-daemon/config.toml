# sbo-daemon container config — Mingo demo (Avail turing, app 506). Paths live
# under the dokku persistent mount /data so state survives redeploys.
# Deployed via CI: GitHub Actions builds the image; dokku pulls it (git:from-image).
[daemon]
socket_path = "/data/daemon.sock"
pid_file = "/data/daemon.pid"
repos_dir = "/data/repos"
repos_index = "/data/repos.json"

[light_client]
network = "turing"
http_port = 7007

[rpc]
endpoints = ["https://turing-rpc.avail.so/rpc"]
timeout_secs = 30

[turbo_da]
endpoint = "https://staging.turbo-api.availproject.org"
# api_key is injected at runtime from the SBO_TURBO_DA_API_KEY env var
# (`dokku config:set sbo-daemon SBO_TURBO_DA_API_KEY=…`) so it stays out of this
# public repo. See Config::apply_env_overrides.
app_id = 506

# State Commitment fast-sync (State Commitment spec v0.3). Generates a snapshot +
# records a checkpoint at the current tip when either 5 writes accumulate or 500
# DA blocks pass (the latter is a max-staleness bound, not a tight cadence —
# every_blocks fires even on an idle chain, so keep it loose to avoid redundant
# same-root checkpoints), and serves them via /v1/snapshot + /v1/sync-points.
# On-chain publishing (publish=true) signs each checkpoint.v1 with the dedicated
# `checkpointer` authority key (granted create-only on /sys/checkpoints/**) loaded
# from key_file. entrypoint.sh writes that file from the SBO_CHECKPOINT_KEY env var
# (`dokku config:set sbo-daemon SBO_CHECKPOINT_KEY=…`) so the secret stays out of
# this public repo. snapshots_dir is on the persistent /data mount.
[checkpoint]
enabled = true
publish = true
key_file = "/data/checkpoint-key.json"
every_writes = 5
every_blocks = 500
snapshots_dir = "/data/snapshots"

# Checkpoint attestations (State Commitment spec v0.4 §Checkpoint Attestations).
# When enabled, this node posts a checkpoint-attestation.v1 for each on-chain
# checkpoint it has INDEPENDENTLY reached and reproduced (comparing its own
# recorded state root at that height), under /u/<attestor>/attestations/checkpoints/.
# The attestor MUST be a DISTINCT identity from sys-checkpointer, not the
# checkpointer itself: a checkpoint.v1 ALREADY counts as sys-checkpointer's own
# signed (block, state_root) claim, so a self-attestation would dedupe to the same
# backer and add nothing. Use a separate key + identity so a threshold-2 client
# {sys-checkpointer, <attestor>} sees two distinct backers.
# Off by default: a meaningful attestation needs an independent operator/identity;
# a co-located attestor (own key, same node) validates the produce→serve→consume
# pipeline but is not operationally independent. entrypoint.sh writes the key
# file from SBO_ATTEST_KEY, like the checkpointer.
#
# Identity setup (one-time, agent-native — mingo-ua8w / delegation chain):
#   1. At https://browserid.me/agents (signed in with your mingo.place identity),
#      create an agent key delegated from it → download the credential JSON.
#   2. Claim the key-rooted name using the SAME key as SBO_ATTEST_KEY:
#        SBO_AGENT_CREDENTIAL=cred.json \
#          sbo id provision-agent <name> sbo+raw://avail:turing:506/
#      (broker + IdP come from the credential; browserid.me endorses, mingo.place
#      mints the <name>@mingo.place cert, then the name is claimed key-rooted.)
# After that claim, `attestor = "<name>"` writes are authorized by signature
# alone (no browserid at runtime); the credential is only needed to re-provision.
# [attest]
# enabled = true
# key_file = "/data/attest-key.json"
# attestor = "attestor2"   # a /sys/names name DISTINCT from sys-checkpointer; MUST be the resolved controller of the key
