# Build sbo-daemon in CI and deploy it to da.sandmill.org by IMAGE.
#
# Why: the dokku host (sandmill.org) has a 24G disk — far too small to hold a
# warm Rust build cache, so BuildKit GC evicts the dep layer and every `git push
# dokku` deploy cold-compiled the whole tree (~40 min). Here GitHub Actions (free
# for public repos, ample disk) does the compile with a persistent `type=gha`
# layer cache, pushes a slim ~100MB runtime image to GHCR, and dokku just PULLS
# and runs it — the host never compiles anything.
#
# The daemon source is cloned from vthunder/sbo inside the Dockerfile at the
# committed SBO_REV, so no build-arg is needed; bumping SBO_REV (a change under
# deploy/sbo-daemon/) is what triggers a deploy.
name: Deploy sbo-daemon

on:
  push:
    branches: [main]
    paths: ['deploy/sbo-daemon/**']
  workflow_dispatch: {}

concurrency:
  group: deploy-daemon
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/sbo-daemon

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/sbo-daemon/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          # Persist the cargo-chef cook (dependency) layer across runs. Unlike the
          # dokku host, GitHub retains this cache — so only changed workspace
          # crates recompile on subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to dokku (pull + run the image)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          install -m 600 /dev/stdin ~/.ssh/id_deploy <<< "${{ secrets.DOKKU_SSH_KEY }}"
          ssh-keyscan -H sandmill.org >> ~/.ssh/known_hosts 2>/dev/null
          # `dokku@` runs the dokku command dispatcher as its forced SSH command,
          # so the args below become `dokku git:from-image sbo-daemon <image>`.
          ssh -i ~/.ssh/id_deploy dokku@sandmill.org \
            git:from-image sbo-daemon "${IMAGE}:${{ github.sha }}"
