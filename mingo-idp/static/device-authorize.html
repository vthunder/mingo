<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authorize this device — mingo.place</title>
  <style>
    :root { color-scheme: light dark; }
    body { font: 16px/1.6 system-ui, -apple-system, sans-serif; max-width: 26rem;
      margin: 4rem auto; padding: 0 1.25rem; text-align: center; }
    .muted { opacity: .65; }
    .err { color: #c53030; }
    a { color: inherit; }
    .spinner { width: 28px; height: 28px; margin: 1.5rem auto; border: 3px solid rgba(127,127,127,.3);
      border-top-color: currentColor; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1 style="font-size:1.3rem">mingo.place</h1>
  <div class="spinner" id="spin"></div>
  <p id="msg" class="muted">Authorizing this device…</p>

<script>
// Device-authorization popup (browserid device-cert model). The login dialog
// opened us with #email=…&device_pubkey=…&config_pubkey=…&return_origin=…;
// we issue the two device certs first-party and post them back to the opener.
(function () {
  'use strict';
  var KEY = 'browserid_device_authorize';
  var msg = document.getElementById('msg');
  var spin = document.getElementById('spin');
  function fail(html) {
    spin.style.display = 'none';
    msg.className = 'err';
    msg.innerHTML = html;
  }

  // Capture fragment params (sessionStorage survives a sign-in round trip;
  // the fragment itself never reaches the server).
  var frag = location.hash.length > 1 ? location.hash.slice(1) : '';
  if (frag) {
    var p = new URLSearchParams(frag);
    if (p.get('email') && p.get('device_pubkey') && p.get('config_pubkey') && p.get('return_origin')) {
      try {
        sessionStorage.setItem(KEY, JSON.stringify({
          email: p.get('email'),
          device_pubkey: p.get('device_pubkey'),
          config_pubkey: p.get('config_pubkey'),
          // The client broker's stable browser holder — passthrough to /device_cert.
          holder: p.get('holder') || null,
          // Hold mode (cold logins): stay open after posting the certs so the
          // dialog can request ONE re-issue under the account's canonical
          // browsers holder once its session join reveals it.
          hold: p.get('hold') || null,
          return_origin: p.get('return_origin'),
          // Redirect mode (popup-hostile browsers): navigate back to the
          // dialog's resume URL instead of postMessage-ing an opener.
          return_url: p.get('return_url') || null
        }));
      } catch (e) {}
    } else if (p.get('agent_email') && p.get('agent_pubkey') && p.get('holder') && p.get('return_origin')) {
      // Agent mode (merged provisioning): the broker's approval page asks this
      // IdP to sign an AGENT device cert — the handle identity itself (as-you)
      // or a `<handle>+<tag>` sub-address, the agent's own key, the
      // broker-assigned holder. Combined mode: when the approving browser has
      // no config cert for the user yet, the same visit also issues the USER's
      // device+config pair (email + device_pubkey + config_pubkey [+
      // user_holder] ride along).
      try {
        sessionStorage.setItem(KEY, JSON.stringify({
          agent_email: p.get('agent_email'),
          agent_pubkey: p.get('agent_pubkey'),
          holder: p.get('holder'),
          user_email: p.get('email') || null,
          user_device_pubkey: p.get('device_pubkey') || null,
          user_config_pubkey: p.get('config_pubkey') || null,
          user_holder: p.get('user_holder') || null,
          return_origin: p.get('return_origin')
        }));
      } catch (e) {}
    }
    history.replaceState(null, '', location.pathname + location.search);
  }
  var params = null;
  try { params = JSON.parse(sessionStorage.getItem(KEY) || 'null'); } catch (e) {}
  if (!params) return fail('This page is opened by the browserid sign-in dialog; open it from there.');

  var returnOrigin;
  try {
    returnOrigin = new URL(params.return_origin).origin;
    if (!/^https?:$/.test(new URL(returnOrigin).protocol)) throw new Error('bad scheme');
  } catch (e) { return fail('Invalid return origin.'); }

  function send(payload) {
    // Redirect mode: hand the result back by navigating to the dialog's
    // resume URL (fragment-carried; certs are public objects). The resume URL
    // must belong to the return origin — same containment postMessage's
    // targetOrigin provides in popup mode.
    if (params.return_url) {
      var ok = false;
      try { ok = new URL(params.return_url).origin === returnOrigin; } catch (e) {}
      if (!ok) return fail('Invalid return URL.');
      try { sessionStorage.removeItem(KEY); } catch (e) {}
      var frag = payload.type === 'browserid:device_certs'
        ? '#device_cert=' + encodeURIComponent(payload.device_cert) +
          '&config_cert=' + encodeURIComponent(payload.config_cert)
        : '#device_error=' + encodeURIComponent(payload.reason || 'refused');
      location.replace(params.return_url + frag);
      return;
    }
    if (!window.opener) return fail('The sign-in dialog window is gone — close this and retry.');
    window.opener.postMessage(payload, returnOrigin);
    try { sessionStorage.removeItem(KEY); } catch (e) {}
    window.close();
  }

  var RETRY_KEY = 'browserid_da_signin_attempted';

  fetch('/whoami', { credentials: 'same-origin', headers: { accept: 'application/json' } })
    .then(function (r) { return r.json(); })
    .then(function (who) {
      if (!who || !who.authenticated || !who.handle) {
        // No live IdP session — the SPA may still LOOK signed in (its state
        // is client-side), but the cookie lapsed. Our pending params survive
        // in sessionStorage across navigations, so hop through the SPA's
        // normal sign-in (which roots at the EXTERNAL identity — no
        // recursion into this IdP) and come back to finish. One shot; a
        // second miss falls back to instructions.
        var tried = false;
        try { tried = sessionStorage.getItem(RETRY_KEY) === '1'; } catch (e) {}
        if (!tried) {
          try { sessionStorage.setItem(RETRY_KEY, '1'); } catch (e) {}
          msg.textContent = 'Signing you in to mingo…';
          location.replace('/?return=%2Fdevice-authorize');
          return;
        }
        return fail('You are not signed in to mingo.place in this browser (or have no handle yet). ' +
          '<a href="/" target="_blank" rel="noreferrer">Open mingo.place</a>, sign in, ' +
          'then close this window and click sign-in again.');
      }
      try { sessionStorage.removeItem(RETRY_KEY); } catch (e) {}
      if (params.agent_email) {
        // Agent mode: the agent identity must be the signed-in handle itself
        // (an as-you service) or a `+tag` sub-address of it.
        var agentEmail = String(params.agent_email).toLowerCase();
        var selfIdentity = (who.handle + '@' + location.hostname).toLowerCase();
        var expectPrefix = (who.handle + '+').toLowerCase();
        if (agentEmail !== selfIdentity && agentEmail.indexOf(expectPrefix) !== 0) {
          return fail('This browser is signed in as ' + selfIdentity +
            ', which cannot authorize the agent ' + agentEmail + '. Switch accounts at mingo.place and try again.');
        }
        msg.textContent = 'Certifying agent ' + agentEmail + '…';
        // Combined mode: issue the USER's own device+config pair first when
        // asked (the broker keystore has no config cert for them yet), so the
        // approval can sign the warrant without a separate sign-in round trip.
        var userCerts = Promise.resolve(null);
        if (params.user_email && params.user_device_pubkey && params.user_config_pubkey) {
          if (String(params.user_email).toLowerCase() !== selfIdentity) {
            return fail('This browser is signed in as ' + selfIdentity + ', not ' + params.user_email + '.');
          }
          userCerts = fetch('/device_cert', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json', accept: 'application/json' },
            body: JSON.stringify(Object.assign({
              device_pubkey: { algorithm: 'Ed25519', publicKey: params.user_device_pubkey },
              config_pubkey: { algorithm: 'Ed25519', publicKey: params.user_config_pubkey }
            }, params.user_holder ? { holder: params.user_holder } : {}))
          }).then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); })
            .then(function (res) {
              if (!res.ok || !res.body.device_cert || !res.body.config_cert) {
                throw new Error((res.body && (res.body.error || res.body.message)) || 'user cert issuance failed');
              }
              return res.body;
            });
        }
        return userCerts.then(function (user) {
          return fetch('/agent_device_cert', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'content-type': 'application/json', accept: 'application/json' },
            body: JSON.stringify({
              agent_pubkey: { algorithm: 'Ed25519', publicKey: params.agent_pubkey },
              agent_email: agentEmail,
              holder: params.holder
            })
          }).then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); })
            .then(function (res) {
              if (!res.ok || !res.body.device_cert) {
                var reason = (res.body && (res.body.error || res.body.message)) || 'issuance failed';
                send({ type: 'browserid:device_error', reason: reason });
                return fail('Could not certify the agent: ' + reason);
              }
              msg.textContent = 'Agent certified — returning…';
              send(Object.assign(
                { type: 'browserid:agent_device_cert', device_cert: res.body.device_cert },
                user ? { user_device_cert: user.device_cert, user_config_cert: user.config_cert } : {}
              ));
            });
        }).catch(function (e) {
          var reason = (e && e.message) ? e.message : String(e);
          send({ type: 'browserid:device_error', reason: reason });
          fail('Could not authorize: ' + reason);
        });
      }
      var identity = (who.handle + '@' + location.hostname).toLowerCase();
      if (identity !== String(params.email).toLowerCase()) {
        return fail('This browser is signed in as ' + identity + ', but the sign-in requested ' +
          params.email + '. Switch accounts at mingo.place and try again.');
      }
      // Issue the (device, config) pair for `holder`; resolves the response body.
      function issuePair(holder) {
        return fetch('/device_cert', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'content-type': 'application/json', accept: 'application/json' },
          body: JSON.stringify(Object.assign({
            device_pubkey: { algorithm: 'Ed25519', publicKey: params.device_pubkey },
            config_pubkey: { algorithm: 'Ed25519', publicKey: params.config_pubkey }
          }, holder ? { holder: holder } : {}))
        }).then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); });
      }
      return issuePair(params.holder).then(function (res) {
        if (!res.ok || !res.body.device_cert || !res.body.config_cert) {
          var reason = (res.body && (res.body.error || res.body.message)) || 'issuance failed';
          send({ type: 'browserid:device_error', reason: reason });
          return fail('Could not authorize this device: ' + reason);
        }
        var payload = {
          type: 'browserid:device_certs',
          device_cert: res.body.device_cert,
          config_cert: res.body.config_cert
        };
        // Hold mode (popup only): post the certs but stay open for one
        // optional re-issue — the dialog's session join may reveal the
        // account's canonical browsers holder, and re-signing the same keys
        // under it avoids orphaning a duplicate namespace (cold login).
        if (params.hold && !params.return_url && window.opener) {
          msg.textContent = 'Device authorized — finishing sign-in…';
          window.opener.postMessage(payload, returnOrigin);
          var closer = setTimeout(function () { window.close(); }, 60 * 1000);
          window.addEventListener('message', function onHold(ev) {
            if (ev.origin !== returnOrigin) return;
            var d = ev.data;
            if (!d || typeof d !== 'object') return;
            if (d.type === 'browserid:done') {
              clearTimeout(closer);
              window.removeEventListener('message', onHold);
              try { sessionStorage.removeItem(KEY); } catch (e) {}
              window.close();
            } else if (d.type === 'browserid:reissue' && d.holder) {
              clearTimeout(closer);
              window.removeEventListener('message', onHold);
              msg.textContent = 'Updating device registration…';
              issuePair(String(d.holder)).then(function (res2) {
                if (!res2.ok || !res2.body.device_cert || !res2.body.config_cert) {
                  var reason2 = (res2.body && (res2.body.error || res2.body.message)) || 'issuance failed';
                  window.opener.postMessage({ type: 'browserid:device_error', reason: reason2 }, returnOrigin);
                } else {
                  window.opener.postMessage({
                    type: 'browserid:device_certs',
                    device_cert: res2.body.device_cert,
                    config_cert: res2.body.config_cert
                  }, returnOrigin);
                }
                try { sessionStorage.removeItem(KEY); } catch (e) {}
                window.close();
              });
            }
          });
          return;
        }
        msg.textContent = 'Device authorized — returning…';
        send(payload);
      });
    })
    .catch(function (e) { fail('Error: ' + (e && e.message ? e.message : e)); });
})();
</script>
</body>
</html>
