<!DOCTYPE html>
<!-- Mingo — the SBO reference client (Phase 7.6).
     Reads confirmed state from the sbo-daemon /v1 HTTP API; writes are built
     with sbo-wasm and signed by the browserid agent (typed signing popup). -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mingo</title>
  <!-- Set the theme BEFORE first paint so there's no flash of the wrong palette.
       A manual choice (localStorage) wins; otherwise default to the OS preference.
       app.js reuses the same key + attribute for its live toggle. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("mingo_theme");
        var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <button id="nav-toggle" class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">☰</button>
    <div class="brand" data-route="#/">mingo</div>
    <div class="spacer"></div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme"></button>
    <div id="auth-slot" class="auth-slot"><!-- sign in / who am i --></div>
  </header>

  <div id="nav-backdrop" class="nav-backdrop"></div>

  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="side-section">
        <div class="side-h">Communities</div>
        <ul id="community-list" class="community-list"><li class="muted">loading…</li></ul>
      </div>
      <div class="side-section">
        <div class="side-h">Daemon</div>
        <div id="state-root" class="muted tiny">—</div>
      </div>
    </aside>

    <main id="main" class="main"><!-- routed view --></main>
  </div>

  <div id="toast" class="toast" hidden></div>

  <!-- browserid standard client. Sets up navigator.id (+ FedCM where supported).
       Classic script, so it runs before the deferred app.js module. -->
  <script src="https://browserid.me/include.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
